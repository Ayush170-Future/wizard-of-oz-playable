      function createTitle() {
        titleText = new PIXI.Text("Save the Tin Man!", goldTextStyle(76, DESIGN_W - 80));
        titleText.anchor.set(0.5);
        uiLayer.addChild(titleText);
      }

      // ---- Tap-to-play start screen ----
      // Built from the live scene: the in-game "Save the Tin Man!" title sits on
      // top, the Tin Man hangs in his frame, and the real in-game "Play Now" ribbon
      // sits below him as the tap target — with the tutorial hand tapping it — and
      // the logo beneath. One tap unlocks audio + BGM and reveals the game. Lives in
      // uiLayer, so it inherits portrait/wide scaling.
      var startPrompt = null;
      // Tap-to-play CTA: the "TAP TO START" plaque art (tap-to-start.webp — glossy
      // blue bevel text, gold flourish, sparkle glow baked in) with the tutorial hand
      // tapping it. Lives in uiLayer so it inherits portrait/wide scaling.
      function createStartScreen(tapTex, handTex) {
        var c = new PIXI.Container();
        c.position.set(DESIGN_W / 2, layout.board.y);

        var ctaW = 720;                                   // design-space plaque width (incl. glow margins)
        var btn = new PIXI.Sprite(tapTex);
        btn.anchor.set(0.5);
        var btnBase = ctaW / tapTex.width;
        btn.scale.set(btnBase);
        c.addChild(btn);
        var btnH = btn.height;
        c.dW = ctaW; c.dH = btnH * 1.2;                   // bounds incl. the tapping hand

        // Tutorial hand tapping the plaque (fingertip near the text centre).
        var hand = new PIXI.Sprite(handTex);
        hand.anchor.set(0.08, 0.04);                      // fingertip
        var hs = (ctaW * 0.30) / handTex.width;
        hand.baseScale = hs; hand.scale.set(hs);
        var hx = ctaW * 0.10, hy = btnH * 0.06;           // rest position (fingertip near centre)
        hand.position.set(hx, hy);
        c.addChild(hand);

        uiLayer.addChild(c);
        startPrompt = c;

        // Smooth, continuous tap loop. press = sin²(phase·π) is a single hump with
        // zero velocity at both ends, so the loop seam never snaps — the hand glides
        // down and lifts in one fluid motion, the plaque dipping with it.
        c.baseScale = 1;
        var t = 0, T = 1.25;
        c.__pulse = function () {
          t += app.ticker.deltaMS / 1000;
          c.scale.set(c.baseScale);                                // apply layout scale only
          var ph = (t % T) / T;
          var press = Math.pow(Math.sin(ph * Math.PI), 2);         // smooth 0→1→0
          hand.scale.set(hand.baseScale * (1 - 0.11 * press));
          hand.position.set(hx - 5 * press, hy + 17 * press);
          btn.scale.set(btnBase * (1 - 0.03 * press));             // plaque dips on press
        };
        app.ticker.add(c.__pulse);
      }

      function beginGame() {
        if (gameLive) return;
        gameLive = true;
        WOZAudio.unlock();   // resume context + start BGM up front (context is now warm)

        boardLayer.visible = true;
        if (titleText) titleText.visible = true;
        if (bottomCta) bottomCta.visible = true;

        // Snap the scene into focus: ease the start-screen blur + dark wash to zero.
        if (startBlur || startDim) {
          var bf = startBlur, dim = startDim; startBlur = null; startDim = null;
          var s0 = bf ? bf.strength : 0;
          var uf = 0;
          var unblur = function () {
            uf += app.ticker.deltaMS / 260;
            var k = Math.min(1, uf);
            if (bf) bf.strength = s0 * (1 - k);
            if (dim) dim.alpha = 1 - k;
            if (k >= 1) {
              app.ticker.remove(unblur);
              if (bgSprite) bgSprite.filters = null;   // drop the filter once sharp
              if (dim && dim.parent) dim.parent.removeChild(dim);
            }
          };
          app.ticker.add(unblur);
        }
        layoutScene();   // reflow to the in-game layout (logo → bottom-left, CTA → bottom-right)

        if (startPrompt) {
          var p = startPrompt; startPrompt = null;
          if (p.__pulse) app.ticker.remove(p.__pulse);
          var f = 0;
          var base = p.baseScale || 1;
          var fade = function () {
            f += app.ticker.deltaMS / 200;          // ~200ms fade
            p.alpha = Math.max(0, 1 - f);
            p.scale.set(base * (1 + 0.06 * f));      // slight zoom-out as it leaves
            if (f >= 1) { app.ticker.remove(fade); if (p.parent) p.parent.removeChild(p); }
          };
          app.ticker.add(fade);
        }
        setTimeout(showHintForCurrent, 600);
      }

      // Above this width:height ratio (tablets & any landscape) we switch to a
      // side layout: game on the right, logo + Play Now in a left column.
      // Portrait phones top out around 0.56, so 0.66 cleanly excludes them and
      // includes every iPad (~0.69–0.75).
      var WIDE_ASPECT = 0.66;

      function layoutScene() {
        var vw = app.screen.width;
        var vh = app.screen.height;

        // Background COVERS the whole viewport (so it bleeds under the notch and
        // home indicator with no black bars).
        var coverScale = Math.max(vw / DESIGN_W, vh / DESIGN_H);
        bgLayer.scale.set(coverScale);
        bgLayer.position.set((vw - DESIGN_W * coverScale) / 2, (vh - DESIGN_H * coverScale) / 2);
        if (bgSprite) { bgSprite.width = DESIGN_W; bgSprite.height = DESIGN_H; }

        var sa = getSafeInsets();
        var padTop = sa.top + 8, padBottom = sa.bottom + 8;
        var safeH = Math.max(1, vh - padTop - padBottom);
        var wide = (vw / vh) >= WIDE_ASPECT;

        var scale, offsetX, offsetY;
        if (!wide) {
          // Portrait phones: game column centred, fit into the safe band so the
          // full design height (title → bottom CTA) clears notch & home bar.
          scale = Math.min(coverScale, safeH / DESIGN_H);
          offsetX = (vw - DESIGN_W * scale) / 2;
          offsetY = padTop + (safeH - DESIGN_H * scale) / 2;
        } else {
          // Wide / tablet: game anchors to the RIGHT, branding column on the
          // left. Scale = fit the safe height, but cap the game to ~58% of the
          // width so it isn't oversized/cramped and the left column gets real
          // room (logo + title + Play Now read at a good size).
          var rightMargin = Math.max(sa.right, vw * 0.045);
          var fitH = (safeH * 0.94) / DESIGN_H;     // ~94% of safe height
          var capW = (vw * 0.58) / DESIGN_W;
          scale = Math.min(fitH, capW);
          offsetX = vw - rightMargin - DESIGN_W * scale;
          offsetY = padTop + (safeH - DESIGN_H * scale) / 2;
        }

        contentLayers.forEach(function (layer) {
          layer.scale.set(scale);
          layer.position.set(offsetX, offsetY);
        });

        // Win takeover: design space fit to the safe band and centred on the FULL
        // screen (so it's centred even when the game is anchored right in wide mode).
        var endScale = Math.min(coverScale, safeH / DESIGN_H);
        endLayer.scale.set(endScale);
        endLayer.position.set((vw - DESIGN_W * endScale) / 2, padTop + (safeH - DESIGN_H * endScale) / 2);

        layoutBranding(wide, vw, vh, scale, offsetX, offsetY, sa, padTop, padBottom);

        // Stage must cover the viewport to receive pointermove anywhere
        stage.hitArea = app.screen;
      }

      // Position title / logo / Play-Now. Portrait = their normal spots inside
      // the game column. Wide = a left column beside the right-anchored game:
      // logo at top, title in the middle, Play Now at the bottom.
      function layoutBranding(wide, vw, vh, scale, offX, offY, sa, padTop, padBottom) {
        function toDesignX(sx) { return (sx - offX) / scale; }
        function toDesignY(sy) { return (sy - offY) / scale; }

        // Start screen has its own balanced composition (logo + CTA plaque),
        // since the in-game title and store CTA are hidden until the tap.
        if (!gameLive && startPrompt) {
          layoutStartScreen(wide, vw, vh, scale, offX, offY, sa, padTop, padBottom, toDesignX, toDesignY);
          return;
        }

        if (!wide) {
          if (titleText) { titleText.resolution = 1; titleText.style.wordWrapWidth = DESIGN_W - 80; titleText.scale.set(1); titleText.position.set(layout.title.x, layout.title.y); }
          if (bottomLogo) { bottomLogo.baseScale = layout.logo.width / bottomLogo.texture.width; bottomLogo.scale.set(bottomLogo.baseScale); bottomLogo.position.set(layout.logo.cx, layout.logo.cy); }
          if (bottomCta) { bottomCta.baseScale = layout.cta.width / bottomCta.texture.width; bottomCta.position.set(layout.cta.cx, layout.cta.cy); }
          return;
        }

        // Left column: from the safe-left edge to where the game starts (offX).
        var leftL = sa.left + Math.max(10, vw * 0.025);
        var colW = Math.max(40, offX - leftL - Math.max(8, vw * 0.015));
        var cx = leftL + colW / 2;          // column centre (screen px)
        var topY = padTop + Math.max(14, vh * 0.045);
        var botY = vh - padBottom - Math.max(14, vh * 0.045);
        var colH = Math.max(1, botY - topY);

        // Fit a sprite into a width/height box (screen px) → its layer-local scale.
        // Heights are budgeted so the three stack without overlap.
        function setBox(sp, maxW, maxH) {
          var fit = Math.min(maxW / sp.texture.width, maxH / sp.texture.height);
          sp.baseScale = fit / scale; sp.scale.set(sp.baseScale);
          return sp.texture.height * fit;   // displayed height (screen px)
        }

        var logoH = 0, ctaH = 0;
        if (bottomLogo) {
          logoH = setBox(bottomLogo, colW * 0.92, colH * 0.30);
          bottomLogo.position.set(toDesignX(cx), toDesignY(topY + logoH / 2));
        }
        if (bottomCta) {
          ctaH = setBox(bottomCta, colW * 0.98, colH * 0.20);   // pulse reads baseScale
          bottomCta.position.set(toDesignX(cx), toDesignY(botY - ctaH / 2));
        }
        if (titleText) {
          // Wrap to ~2 lines for a poster look; high resolution so the upscale
          // stays crisp. Centre it in the gap between the logo and Play Now.
          titleText.resolution = 4;
          titleText.style.wordWrapWidth = 320;
          titleText.scale.set(1);
          var tnW = titleText.width || 300, tnH = titleText.height || 120;
          var tFit = Math.min((colW * 0.96) / tnW, (colH * 0.30) / tnH);
          titleText.scale.set(tFit / scale);
          titleText.position.set(toDesignX(cx), toDesignY(((topY + logoH) + (botY - ctaH)) / 2));
        }
      }

      // Balanced start-screen composition. Portrait: the CTA plaque sits in the
      // board's place and the logo is CENTRED beneath it (the in-game logo is
      // bottom-left, paired with the store CTA — but that CTA is hidden here, so a
      // left-anchored logo would look lopsided). Wide: logo + plaque stack, centred
      // as a group in the left column, with the Tin Man hero on the right.
      var PLAQUE_W = 470, PLAQUE_H = 132;   // design-space size of the CTA plaque
      function layoutStartScreen(wide, vw, vh, scale, offX, offY, sa, padTop, padBottom, toDesignX, toDesignY) {
        if (!wide) {
          // Stack: "Save the Tin Man!" title (top) → Tin Man frame → "Tap to Play!"
          // → logo. The frame block occupies ~105..820; the prompt and logo split
          // the space below it down to the bottom margin with even spacing.
          if (titleText) {
            titleText.resolution = 1;
            titleText.style.wordWrapWidth = DESIGN_W - 80;
            titleText.scale.set(1);
            titleText.position.set(layout.title.x, layout.title.y);
          }
          var frameBottom = 840, bottomMargin = 1600;
          var band = bottomMargin - frameBottom;        // vertical room for prompt + logo
          if (startPrompt) {
            startPrompt.baseScale = 1;
            startPrompt.position.set(DESIGN_W / 2, frameBottom + band * 0.32);
          }
          if (bottomLogo) {
            var lw = 360;   // stands alone, so noticeably larger than the in-game 144
            bottomLogo.baseScale = lw / bottomLogo.texture.width;
            bottomLogo.scale.set(bottomLogo.baseScale);
            bottomLogo.position.set(DESIGN_W / 2, frameBottom + band * 0.78);
          }
          return;
        }

        // Wide: logo + CTA plaque stacked and centred as a group in the left
        // branding column, with the Tin Man hero on the right. Keeps the call to
        // action prominent (it's the whole point) while staying balanced.
        var leftL = sa.left + Math.max(10, vw * 0.025);
        var colW = Math.max(40, offX - leftL - Math.max(8, vw * 0.015));
        var cx = leftL + colW / 2;
        var topY = padTop + Math.max(14, vh * 0.045);
        var botY = vh - padBottom - Math.max(14, vh * 0.045);
        var colH = Math.max(1, botY - topY);

        // Stack: "Save the Tin Man!" title → logo → "Tap to Play!" plaque, centred
        // as a group in the left column; Tin Man hero on the right.
        var titleH = 0;
        if (titleText) {
          titleText.resolution = 4;
          titleText.style.wordWrapWidth = 320;
          titleText.scale.set(1);
          var tnW = titleText.width || 300, tnH = titleText.height || 120;
          var tFit = Math.min((colW * 0.96) / tnW, (colH * 0.26) / tnH);
          titleText.scale.set(tFit / scale);
          titleH = tnH * tFit;                                              // screen px
        }
        var logoFit = bottomLogo ? Math.min((colW * 0.74) / bottomLogo.texture.width, (colH * 0.26) / bottomLogo.texture.height) : 0;
        var logoH = bottomLogo ? bottomLogo.texture.height * logoFit : 0;   // screen px
        var pdW = startPrompt.dW || PLAQUE_W, pdH = startPrompt.dH || PLAQUE_H;
        var plaqueFit = Math.min((colW * 0.96) / pdW, (colH * 0.26) / pdH);
        var plaqueH = pdH * plaqueFit;                                       // screen px

        var gap = Math.max(20, colH * 0.07);
        var stackH = titleH + gap + logoH + gap + plaqueH;
        var stackTop = topY + (colH - stackH) / 2;

        if (titleText) titleText.position.set(toDesignX(cx), toDesignY(stackTop + titleH / 2));
        if (bottomLogo) {
          bottomLogo.baseScale = logoFit / scale;
          bottomLogo.scale.set(bottomLogo.baseScale);
          bottomLogo.position.set(toDesignX(cx), toDesignY(stackTop + titleH + gap + logoH / 2));
        }
        if (startPrompt) {
          startPrompt.baseScale = plaqueFit / scale;
          startPrompt.position.set(toDesignX(cx), toDesignY(stackTop + titleH + gap + logoH + gap + plaqueH / 2));
        }
      }

      function onResize() {
        layoutScene();
      }

      function start() {
        // Create renderer after MRAID ready — layout/sizing must not happen before.
        app = new PIXI.Application({
          resizeTo: window,
          backgroundColor: 0x1a0a2e,
          antialias: true,
          resolution: Math.min(window.devicePixelRatio || 1, 2),
          autoDensity: true
        });
        document.getElementById("game").appendChild(app.view);
        // Fix #2: show a fallback message if the WebGL context is lost.
        app.view.addEventListener("webglcontextlost", function (e) {
          e.preventDefault();
          showError("Rendering context lost. Please reload the ad.", "webglcontextlost");
        });
        stage = app.stage;
        bgLayer = new PIXI.Container();
        frameLayer = new PIXI.Container();
        tinManLayer = new PIXI.Container();
        boardLayer = new PIXI.Container();
        tutorialLayer = new PIXI.Container();
        uiLayer = new PIXI.Container();
        endLayer = new PIXI.Container();
        allLayers = [bgLayer, frameLayer, tinManLayer, boardLayer, tutorialLayer, uiLayer, endLayer];
        stage.addChild.apply(stage, allLayers);
        contentLayers = [frameLayer, tinManLayer, boardLayer, tutorialLayer, uiLayer];

        // Audio: init + load, unlock on first user gesture (autoplay is blocked)
        WOZAudio.init();
        WOZAudio.loadAll(AUDIO_URLS);
        if (window.location.search.indexOf("qa") >= 0) window.__qaAudio = WOZAudio;
        // Unlock on the first real gesture. iOS can need a couple of taps before
        // the context reports "running" (capture phase, so PIXI's own pointer
        // handling can't swallow them). These stay attached for the whole session:
        // iOS RE-SUSPENDS the context between interactions, and resume() only works
        // inside a user-activation event. A swipe commits on pointermove (NOT an
        // activation event), so the only place we can legally re-resume before the
        // swap SFX fires is the swipe's own pointerdown/touchstart — hence we must
        // keep listening. Removing them after the first unlock is exactly what made
        // the first post-resuspend swipe silent.
        var unlockEvents = ["pointerdown", "touchstart", "touchend", "mousedown", "click"];
        function unlockOnce() {
          if (WOZAudio.ctx && WOZAudio.ctx.state === "running") return; // already live — cheap no-op
          WOZAudio.unlock();
        }
        unlockEvents.forEach(function (ev) { document.addEventListener(ev, unlockOnce, true); });

        // Fix #1: mute audio when the ad is hidden or not viewable.
        document.addEventListener("visibilitychange", function () {
          WOZAudio.setMuted(document.hidden);
        });
        mraid.addEventListener("viewableChange", function (viewable) {
          WOZAudio.setMuted(!viewable);
        });

        // On-device audio diagnostics: load ...index.html?debug on the phone to
        // see a live readout (context state, decoded count, last error) pinned
        // to the top-left. Lets us diagnose iOS silence without a desktop console.
        if (window.location.search.indexOf("debug") >= 0) {
          var dbg = document.createElement("div");
          dbg.style.cssText = "position:fixed;top:0;left:0;z-index:99999;background:rgba(0,0,0,.8);" +
            "color:#0f0;font:11px/1.4 monospace;padding:6px 8px;white-space:pre;max-width:100vw";
          document.body.appendChild(dbg);
          setInterval(function () {
            var a = WOZAudio, ctx = a.ctx;
            dbg.textContent =
              "ctx: " + (ctx ? ctx.state : "none") +
              "  rate: " + (ctx ? ctx.sampleRate : "-") +
              "\nunlocked(started): " + a.started + "   bgmOn: " + a.bgmOn + "   muted: " + a.muted +
              "\ndecoded: " + a.nDecoded + "/" + a.nReq +
              "\nsessEl: " + (a.sessEl ? (a.sessEl.paused ? "paused" : "playing") : "none") +
              "\nlastPlay: " + (a.lastPlay || "(none)") +
              "\npending: " + a.pending.length +
              "\nlastErr: " + (a.lastErr || "(none)");
          }, 250);
        }

        // Stage-level pointer handling drives swipe detection
        stage.eventMode = "static";
        stage.hitArea = app.screen;
        stage.on("pointermove", onPointerMove);
        stage.on("pointerup", onPointerUp);
        stage.on("pointerupoutside", onPointerUp);

        loadAssets(function (assets) {
          createBackground(assets.background);
          createStartBackdrop();
          createFrame(assets.frame);
          createTinMan(assets.tinman, assets.nuts);
          SPARKLE_TEX = assets.sparkles;
          createBoard(assets.board, assets.icons);
          createHand(assets.hand);
          createLogo(assets.logo);
          createCta(assets.play);
          endTextures = { logo: assets.logo, play: assets.play, hero: assets.hero };
          createTitle();
          createStartScreen(assets.tap, assets.hand);

          // Start-screen state: hold gameplay behind the tap. Keep the Tin Man,
          // frame, background, "Save the Tin Man!" title and logo visible; hide the
          // board and the store CTA until the player taps to begin.
          boardLayer.visible = false;
          if (bottomCta) bottomCta.visible = false;
          layoutScene();

          function onStartTap() { stage.off("pointertap", onStartTap); beginGame(); }
          stage.on("pointertap", onStartTap);

          // QA hook for testing the release flow without match detection
          if (window.location.search.indexOf("qa") >= 0) {
            window.__releaseBolt = releaseNextBolt;
            window.__beginGame = beginGame;
          }
        });

        window.addEventListener("resize", onResize);
      }

      if (mraid.getState() === "loading") {
        mraid.addEventListener("ready", start);
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
